name: Build $1B+ Revenue Universe

# PHASE 1 of the two-phase screener pipeline: bootstraps and refreshes
# screener/universe_1b_revenue.csv -- the list of US-listed (NASDAQ/NYSE)
# companies with > $1B trailing revenue that the daily screener scans
# (PHASE 2, daily-screener.yml).
#
# Checking revenue for thousands of tickers from a single IP trips Yahoo
# Finance's rate limiting -- the same throttling that can stall the daily
# screener if it scans its universe twice in a short window. Each
# GitHub-hosted runner gets its own IP though, so this fans the work out
# across SHARD_COUNT parallel "scan" jobs (each checking a different slice
# of the oldest/never-checked tickers -- see CHUNK_SIZE in
# build_universe.py) and a single "merge" job combines their results and
# commits. Running N shards checks roughly N * CHUNK_SIZE tickers/day, so
# the universe bootstraps in days rather than weeks; afterwards this keeps
# refreshing stale entries indefinitely.

on:
  schedule:
    - cron: '0 11 * * *'   # ~daily, hours before the 6 AM Pacific screener
  workflow_dispatch:        # adds a manual "Run workflow" button for testing

permissions:
  contents: write           # required so the merge job can commit the universe back

env:
  SHARD_COUNT: 4

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        shard: [0, 1, 2, 3]
      fail-fast: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scan this shard's slice of the universe
        run: |
          python screener/build_universe.py scan \
            --shard-index ${{ matrix.shard }} --shard-count ${{ env.SHARD_COUNT }}

      - name: Upload this shard's results
        uses: actions/upload-artifact@v4
        with:
          name: universe-partial-${{ matrix.shard }}
          path: screener/universe_partial_${{ matrix.shard }}.csv
          if-no-files-found: error

  merge:
    needs: scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download every shard's results
        uses: actions/download-artifact@v4
        with:
          pattern: universe-partial-*
          path: screener/
          merge-multiple: true

      - name: Merge shard results, recompute the qualifying list
        run: python screener/build_universe.py merge --shard-count ${{ env.SHARD_COUNT }}

      - name: Commit universe files back to the repo
        run: |
          git config user.name  "screener-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screener/universe_1b_revenue.csv screener/universe_scan_state.csv
          git commit -m "Refresh \$1B+ revenue universe $(TZ=America/Los_Angeles date +%F)" \
            || echo "No changes to commit"
          git push
