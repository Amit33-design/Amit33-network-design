name: AlphaHunter Daily Scan

# Runs the AlphaHunter AI scan every morning and commits the ranked results
# (JSON + CSV) to alphahunter-ai/results/. This is the platform sibling of the
# legacy daily-screener.yml — both run off the same >$1B universe.

on:
  schedule:
    # GitHub Actions cron is UTC and does not adjust for DST.
    # ~6:30 AM Pacific = 13:30 UTC (PDT) / 14:30 UTC (PST). Trigger both,
    # then gate to the real hour in the job.
    - cron: '30 13,14 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max tickers to scan (blank = full universe)'
        required: false
        default: ''
      loose:
        description: 'Surface near-misses (core crash filter only)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: alphahunter-ai
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Gate to ~6 AM Pacific (manual runs always proceed)
        id: gate
        working-directory: .
        run: |
          HOUR=$(TZ=America/Los_Angeles date +%H)
          echo "Pacific hour: $HOUR"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" = "06" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not 6 AM Pacific; skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Run the AlphaHunter scan
        if: steps.gate.outputs.run == 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}/alphahunter-ai
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.loose }}" = "true" ]; then
            ARGS="$ARGS --loose"
          fi
          python -m backend.run_daily $ARGS

      - name: Commit results back to the repo
        if: steps.gate.outputs.run == 'true'
        working-directory: .
        run: |
          git config user.name  "alphahunter-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alphahunter-ai/results/
          git commit -m "AlphaHunter daily scan $(TZ=America/Los_Angeles date +%F)" \
            || echo "No changes to commit"
          git pull --rebase origin main || true
          git push

      - name: Upload results as a downloadable artifact
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: alphahunter-results
          path: alphahunter-ai/results/
          if-no-files-found: ignore
