name: AlphaHunter Daily Scan

# Runs the AlphaHunter AI scan every morning and commits the ranked results
# (JSON + CSV) to alphahunter-ai/results/. This is the platform sibling of the
# legacy daily-screener.yml — both run off the same >$1B universe.

on:
  schedule:
    # GitHub Actions cron is UTC, doesn't adjust for DST, and scheduled runs are
    # frequently DELAYED 30-90 min under load. So we fire several morning slots
    # and gate on "has today's snapshot already been built?" (idempotent) rather
    # than a strict clock hour — otherwise a delayed run misses the hour window
    # and the job silently succeeds without scanning.
    # 13:30/15:30/17:30 UTC ≈ 6:30/8:30/10:30 AM Pacific (PDT).
    - cron: '30 13,15,17 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max tickers to scan (blank = full universe)'
        required: false
        default: ''
      loose:
        description: 'Surface near-misses (core crash filter only)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: alphahunter-ai
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Gate — run once per Pacific day (robust to cron delays)
        id: gate
        working-directory: .
        run: |
          TODAY=$(TZ=America/Los_Angeles date +%F)
          SNAP=alphahunter-ai/frontend/public/snapshot.json
          DONE=$(python3 -c "import json;print(json.load(open('$SNAP')).get('date',''))" 2>/dev/null || echo "")
          echo "today(PT)=$TODAY  snapshot_date=$DONE  event=${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual dispatch -> run"; echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$DONE" != "$TODAY" ]; then
            echo "no snapshot for today yet -> run"; echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "already scanned today ($DONE) -> skip"; echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Run the AlphaHunter scan
        if: steps.gate.outputs.run == 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}/alphahunter-ai
          # Optional alert channels — set these repo secrets to receive a
          # morning digest of the top setups; unset = digest is just logged.
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.loose }}" = "true" ]; then
            ARGS="$ARGS --loose"
          fi
          python -m backend.run_daily $ARGS

      - name: Commit results back to the repo
        if: steps.gate.outputs.run == 'true'
        working-directory: .
        run: |
          git config user.name  "alphahunter-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alphahunter-ai/results/ alphahunter-ai/frontend/public/snapshot.json
          git commit -m "AlphaHunter daily scan $(TZ=America/Los_Angeles date +%F)" \
            || { echo "No changes to commit"; exit 0; }
          # The scan owns the generated files (snapshot.json, results/), so on a
          # race with another push prefer our version (-X theirs during rebase).
          # Retry with backoff; always end on a real branch before pushing.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then echo "pushed"; exit 0; fi
            echo "push rejected; rebasing onto latest main (attempt $attempt)…"
            git fetch origin main
            git rebase -X theirs origin/main || git rebase --abort
            sleep $((attempt * 3))
          done
          echo "ERROR: could not push after retries"; exit 1

      - name: Upload results as a downloadable artifact
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: alphahunter-results
          path: alphahunter-ai/results/
          if-no-files-found: ignore
