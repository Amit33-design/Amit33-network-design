name: AlphaHunter Dashboard (9 AM ET)

# Scores the curated multi-domain watchlist and commits
# alphahunter-ai/frontend/public/dashboard.json, which the Dashboard renders.
# Auto-deploys to Vercel on push.

on:
  schedule:
    # Scheduled runs are often DELAYED under load, so fire several morning slots
    # and gate on "already built today?" instead of a strict clock hour.
    # 13:00/15:00/17:00 UTC ≈ 9/11/1 AM-PM ET.
    - cron: '0 13,15,17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: alphahunter-ai
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Gate — run once per Eastern day (robust to cron delays)
        id: gate
        working-directory: .
        run: |
          TODAY=$(TZ=America/New_York date +%F)
          DASH=alphahunter-ai/frontend/public/dashboard.json
          DONE=$(python3 -c "import json;print(json.load(open('$DASH')).get('date',''))" 2>/dev/null || echo "")
          echo "today(ET)=$TODAY  dashboard_date=$DONE  event=${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual dispatch -> run"; echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$DONE" != "$TODAY" ]; then
            echo "no dashboard for today yet -> run"; echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "already built today ($DONE) -> skip"; echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Build the dashboard
        if: steps.gate.outputs.run == 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}/alphahunter-ai
        run: python -m backend.run_dashboard

      - name: Commit dashboard data
        if: steps.gate.outputs.run == 'true'
        working-directory: .
        run: |
          git config user.name  "alphahunter-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alphahunter-ai/frontend/public/dashboard.json
          git commit -m "Dashboard refresh $(TZ=America/New_York date +%F)" \
            || { echo "No changes to commit"; exit 0; }
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then echo "pushed"; exit 0; fi
            git fetch origin main
            git rebase -X theirs origin/main || git rebase --abort
            sleep $((attempt * 3))
          done
          echo "ERROR: could not push after retries"; exit 1
